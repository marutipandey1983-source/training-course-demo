<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic 1 — The Local-First Digital Shift | SingleInterface NBD Learning</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#0070FC;
  --blue-dark:#0056C7;
  --blue-light:#E8F1FF;
  --blue-mid:#C2D9FF;
  --gray:#5F6368;
  --gray-light:#8A8E96;
  --bg:#F2F8FF;
  --white:#FFFFFF;
  --border:#D0E2FF;
  --heading-dark:#0A1F5C;
  --success:#1E8A4A;
  --warning:#C45C00;
  --sidebar-w:270px;
  --header-h:64px;
}
html,body{height:100%;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--gray);font-size:15px;line-height:1.7}

/* ---- HEADER ---- */
:root{--header-h:68px}
/* Single white bar, no section borders — clean separators only */
#hdr{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);
  background:var(--white);border-bottom:1.5px solid var(--border);
  display:flex;align-items:center;gap:0;z-index:100;padding:0;overflow:hidden
}
/* Logo + hub: plain white, no background, no border */
.hdr-logo-zone{
  display:flex;align-items:center;gap:10px;
  padding:0 22px 0 20px;flex-shrink:0
}
/* Invert the white-on-black JPEG → black logo on white header */
.hdr-logo-img{height:24px;width:auto;filter:invert(1);flex-shrink:0}
.hdr-hub-text{
  font-family:Georgia,'Times New Roman',serif;
  font-size:13px;font-weight:normal;
  color:var(--heading-dark);white-space:nowrap;letter-spacing:.01em
}
/* Short centered vertical separator — NOT full-height border */
.hdr-vsep{
  width:1px;height:34px;background:var(--border);
  flex-shrink:0;margin:0 4px
}
/* Center: cert label + track name */
.hdr-center{
  display:flex;flex-direction:column;justify-content:center;
  padding:0 18px;flex-shrink:0
}
.hdr-cert{
  font-size:9px;text-transform:uppercase;letter-spacing:.14em;
  color:var(--blue);font-weight:700;margin-bottom:3px
}
.hdr-track{
  font-family:Georgia,'Times New Roman',serif;font-size:14px;
  font-weight:normal;color:var(--heading-dark);white-space:nowrap
}
/* Progress */
.hdr-progress-wrap{
  flex:1;display:flex;align-items:center;gap:12px;padding:0 18px
}
.hdr-progress-label{font-size:11px;color:var(--gray-light);white-space:nowrap}
.hdr-bar-outer{flex:1;max-width:200px;height:4px;background:var(--blue-mid);border-radius:3px;overflow:hidden}
.hdr-bar-inner{height:100%;background:var(--blue);border-radius:3px;transition:width .5s ease}
.hdr-pct{font-size:12px;font-weight:700;color:var(--blue);min-width:30px}
/* Timing stats */
.hdr-timing{display:flex;align-items:center;gap:0;flex-shrink:0;padding-right:6px}
.hdr-time-block{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:0 14px
}
.htb-val{
  font-family:Georgia,'Times New Roman',serif;font-size:16px;
  color:var(--heading-dark);line-height:1;font-weight:normal
}
.htb-val.remain{color:var(--blue)}
.htb-lbl{
  font-size:9px;text-transform:uppercase;letter-spacing:.09em;
  color:var(--gray-light);font-weight:700;margin-top:3px
}

/* ---- LAYOUT ---- */
#layout{display:flex;padding-top:var(--header-h);min-height:100vh}

/* ---- SIDEBAR ---- */
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--white);border-right:1.5px solid var(--border);position:fixed;top:var(--header-h);bottom:0;overflow-y:auto;display:flex;flex-direction:column}
.sb-head{padding:20px 20px 12px;border-bottom:1px solid var(--border)}
.sb-head-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-light);font-weight:700;margin-bottom:4px}
.sb-head-title{font-size:13px;font-weight:600;color:var(--heading-dark);font-family:Georgia,serif;line-height:1.4}
.sb-chapters{flex:1;padding:12px 12px}
.sb-ch{display:flex;align-items:flex-start;gap:10px;padding:10px 10px;border-radius:8px;margin-bottom:4px;cursor:pointer;transition:background .2s;border:1px solid transparent}
.sb-ch.active{background:var(--blue-light);border-color:var(--blue-mid)}
.sb-ch.completed{cursor:pointer}
.sb-ch.locked{opacity:.45;cursor:not-allowed}
.sb-ch:hover:not(.locked){background:var(--bg)}
.sb-ch.active:hover{background:var(--blue-light)}
.sb-icon{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:11px;font-weight:700;color:var(--gray-light)}
.sb-ch.active .sb-icon{border-color:var(--blue);background:var(--blue);color:var(--white)}
.sb-ch.completed .sb-icon{border-color:var(--success);background:var(--success);color:var(--white)}
.sb-ch-text{flex:1}
.sb-ch-num{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-light);font-weight:600}
.sb-ch.active .sb-ch-num{color:var(--blue)}
.sb-ch-title{font-size:12.5px;font-weight:500;color:var(--gray);line-height:1.35;margin-top:1px}
.sb-ch.active .sb-ch-title{color:var(--heading-dark);font-weight:600}
.sb-ch.completed .sb-ch-title{color:var(--gray)}
.sb-divider{height:1px;background:var(--border);margin:12px 0}
.sb-assess-btn{margin:0 12px 16px;padding:10px;background:var(--blue);color:var(--white);border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;width:calc(100% - 24px);font-family:Georgia,serif;transition:background .2s;display:none}
.sb-assess-btn:hover{background:var(--blue-dark)}
.sb-assess-btn.visible{display:block}
.sb-assess-active{margin:0 12px 16px;padding:10px;background:var(--blue-light);border:1.5px solid var(--blue);border-radius:8px;font-size:12px;font-weight:600;color:var(--blue);text-align:center;cursor:pointer}
.sb-track-complete{margin:0 12px 14px;padding:10px 12px;background:#E8F7EE;border:1.5px solid #A8D5B5;border-radius:8px;font-size:12px;font-weight:600;color:#1E8A4A;text-align:center;display:none}
.sb-track-incomplete{margin:0 12px 14px;padding:10px 12px;background:#FFF3E0;border:1.5px solid #FFCC80;border-radius:8px;font-size:11px;font-weight:600;color:#C45C00;text-align:center;display:none;line-height:1.4}

/* ---- MAIN ---- */
#main{flex:1;margin-left:var(--sidebar-w);min-height:calc(100vh - var(--header-h));display:flex;flex-direction:column}
#screen-area{flex:1;padding:36px 48px;max-width:860px;width:100%}

/* ---- CHAPTER SCREEN ---- */
.ch-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.ch-eyebrow-tag{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--blue);font-weight:700;background:var(--blue-light);padding:3px 10px;border-radius:12px;border:1px solid var(--blue-mid)}
.ch-eyebrow-track{font-size:11px;color:var(--gray-light)}
.ch-title{font-family:Georgia,'Times New Roman',serif;font-size:28px;font-weight:normal;color:var(--heading-dark);line-height:1.25;margin-bottom:10px}
.ch-intro-bar{height:3px;width:56px;background:var(--blue);border-radius:2px;margin-bottom:24px}
.ch-objectives{background:var(--blue-light);border:1px solid var(--blue-mid);border-radius:10px;padding:18px 22px;margin-bottom:30px}
.ch-obj-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);font-weight:700;margin-bottom:10px}
.ch-obj-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.ch-obj-list li{font-size:13px;color:var(--gray);display:flex;align-items:baseline;gap:8px}
.ch-obj-list li::before{content:"→";color:var(--blue);font-weight:600;flex-shrink:0}

/* Content typography */
.content-body h2{font-family:Georgia,serif;font-size:20px;font-weight:normal;color:var(--heading-dark);margin:32px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.content-body h3{font-family:Georgia,serif;font-size:16px;font-weight:600;color:var(--blue);margin:24px 0 8px}
.content-body p{font-size:15px;line-height:1.8;color:var(--gray);margin-bottom:16px}
.content-body ul,.content-body ol{margin:0 0 16px 0;padding-left:0;list-style:none}
.content-body ul li,.content-body ol li{font-size:15px;line-height:1.75;color:var(--gray);padding:4px 0 4px 24px;position:relative}
.content-body ul li::before{content:"•";color:var(--blue);font-weight:700;position:absolute;left:8px}
.content-body ol{counter-reset:ol-c}
.content-body ol li{counter-increment:ol-c}
.content-body ol li::before{content:counter(ol-c)".";color:var(--blue);font-weight:700;position:absolute;left:0;font-size:13px}
.content-body strong{color:var(--heading-dark);font-weight:600}

/* Stat callout */
.stat-row{display:flex;gap:14px;margin:20px 0;flex-wrap:wrap}
.stat-card{background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:16px 20px;flex:1;min-width:130px;text-align:center}
.stat-n{font-family:Georgia,serif;font-size:28px;color:var(--blue);font-weight:normal;line-height:1}
.stat-l{font-size:12px;color:var(--gray-light);margin-top:4px;line-height:1.3}

/* Case study box */
.case-study{background:var(--white);border:1.5px solid var(--blue-mid);border-left:4px solid var(--blue);border-radius:0 10px 10px 0;padding:22px 24px;margin:28px 0}
.cs-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--blue);font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.cs-label::before{content:"";display:block;width:16px;height:2px;background:var(--blue)}
.cs-title{font-family:Georgia,serif;font-size:17px;color:var(--heading-dark);margin-bottom:12px;font-weight:normal}
.cs-body{font-size:14px;line-height:1.75;color:var(--gray)}
.cs-body p{margin-bottom:10px;font-size:14px}
.cs-body ol{counter-reset:cs-c;margin-bottom:10px}
.cs-body ol li{counter-increment:cs-c;padding-left:22px;position:relative;font-size:14px;line-height:1.7;padding-top:2px;padding-bottom:2px}
.cs-body ol li::before{content:counter(cs-c)".";color:var(--blue);font-weight:700;position:absolute;left:0}
.cs-result{background:var(--blue-light);border-radius:6px;padding:12px 16px;margin-top:12px;font-size:13px;font-weight:600;color:var(--heading-dark)}
.cs-result span{color:var(--blue)}

/* Key takeaways */
.takeaways{background:var(--heading-dark);border-radius:10px;padding:22px 24px;margin:28px 0}
.takeaways-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--blue-mid);font-weight:700;margin-bottom:12px}
.takeaways ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.takeaways ul li{font-size:14px;color:#C2D9FF;display:flex;align-items:baseline;gap:8px;line-height:1.5}
.takeaways ul li::before{content:"✓";color:var(--blue);font-weight:700;flex-shrink:0}

/* Infographic container */
.infographic{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:24px;margin:24px 0;overflow-x:auto}
.infographic-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-light);font-weight:700;margin-bottom:16px;text-align:center}

/* Chapter navigation */
.ch-nav-footer{display:flex;align-items:center;justify-content:space-between;margin-top:40px;padding-top:24px;border-top:1px solid var(--border)}
.btn-prev{display:flex;align-items:center;gap:8px;padding:11px 22px;border:1.5px solid var(--border);border-radius:8px;background:var(--white);color:var(--gray);font-size:14px;font-weight:600;cursor:pointer;font-family:'Segoe UI',sans-serif;transition:all .2s}
.btn-prev:hover{border-color:var(--blue);color:var(--blue)}
.btn-prev:disabled{opacity:.3;cursor:default}
.btn-next{display:flex;align-items:center;gap:8px;padding:11px 28px;border:none;border-radius:8px;background:var(--blue);color:var(--white);font-size:14px;font-weight:600;cursor:pointer;font-family:'Segoe UI',sans-serif;transition:background .2s}
.btn-next:hover{background:var(--blue-dark)}
.ch-of{font-size:12px;color:var(--gray-light)}

/* ---- ASSESSMENT SCREEN ---- */
.assess-header{margin-bottom:28px}
.assess-title{font-family:Georgia,serif;font-size:26px;color:var(--heading-dark);margin-bottom:8px;font-weight:normal}
.assess-sub{font-size:14px;color:var(--gray);line-height:1.6;margin-bottom:16px}
.assess-meta{display:flex;gap:16px;flex-wrap:wrap}
.assess-meta-chip{background:var(--blue-light);border:1px solid var(--blue-mid);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:600;color:var(--blue)}
.q-block{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:22px 24px;margin-bottom:14px}
.q-num{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);font-weight:700;margin-bottom:8px}
.q-text{font-size:15px;font-weight:500;color:var(--heading-dark);line-height:1.5;margin-bottom:16px;font-family:Georgia,serif}
.q-options{display:flex;flex-direction:column;gap:8px}
.q-opt{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;transition:all .2s;background:var(--white)}
.q-opt:hover{border-color:var(--blue);background:var(--blue-light)}
.q-opt.selected{border-color:var(--blue);background:var(--blue-light)}
.q-opt.correct{border-color:var(--success);background:#E6F7ED}
.q-opt.wrong{border-color:#D93025;background:#FDECEA}
.q-opt input[type=radio]{accent-color:var(--blue);margin-top:3px;flex-shrink:0}
.q-opt-label{font-size:14px;color:var(--gray);line-height:1.5;cursor:pointer}
.assess-submit{padding:13px 36px;background:var(--blue);color:var(--white);border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:Georgia,serif;transition:background .2s;margin-top:8px}
.assess-submit:hover{background:var(--blue-dark)}
.assess-submit:disabled{opacity:.5;cursor:not-allowed}

/* ---- RESULTS SCREEN ---- */
.results-wrap{text-align:center;padding:20px 0}
.results-score-ring{width:130px;height:130px;margin:0 auto 24px;position:relative}
.results-score-ring svg{transform:rotate(-90deg)}
.results-score-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.results-score-num{font-family:Georgia,serif;font-size:32px;color:var(--heading-dark);line-height:1}
.results-score-pct{font-size:12px;color:var(--gray-light);margin-top:2px}
.results-verdict{font-family:Georgia,serif;font-size:22px;color:var(--heading-dark);margin-bottom:8px}
.results-sub{font-size:14px;color:var(--gray);line-height:1.6;max-width:480px;margin:0 auto 28px}
.results-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-results-primary{padding:12px 28px;background:var(--blue);color:var(--white);border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Segoe UI',sans-serif;transition:background .2s}
.btn-results-primary:hover{background:var(--blue-dark)}
.btn-results-secondary{padding:12px 28px;background:var(--white);color:var(--blue);border:1.5px solid var(--blue);border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Segoe UI',sans-serif;transition:all .2s}
.btn-results-secondary:hover{background:var(--blue-light)}
.results-breakdown{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:20px;margin-top:28px;text-align:left;max-width:560px;margin-left:auto;margin-right:auto}
.rb-title{font-size:13px;font-weight:600;color:var(--heading-dark);margin-bottom:12px;text-align:center}
.rb-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bg)}
.rb-row:last-child{border:none}
.rb-q{font-size:12px;color:var(--gray);flex:1;line-height:1.4}
.rb-tick{font-size:14px;flex-shrink:0}

/* ---- ANSWER REVIEW ---- */
.ans-review-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:13px 20px;background:var(--white);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;color:var(--heading-dark);transition:all .2s;margin-top:12px;font-family:'Segoe UI',sans-serif}
.ans-review-btn:hover{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.ans-review-btn .arb-icon{font-size:16px;transition:transform .25s}
.ans-review-btn.open{border-color:var(--blue);background:var(--blue-light);color:var(--blue);border-radius:10px 10px 0 0;border-bottom:none}
.ans-review-btn.open .arb-icon{transform:rotate(180deg)}
.ans-review-panel{border:1.5px solid var(--blue);border-top:none;border-radius:0 0 10px 10px;background:var(--white);overflow:hidden;max-height:0;transition:max-height .45s ease}
.ans-review-panel.open{max-height:9999px}
.ar-inner{padding:16px 20px}
.ar-item{padding:14px 0;border-bottom:1px solid var(--bg)}
.ar-item:last-child{border:none}
.ar-q-num{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);font-weight:700;margin-bottom:5px}
.ar-q-text{font-size:14px;font-weight:500;color:var(--heading-dark);font-family:Georgia,serif;line-height:1.45;margin-bottom:10px}
.ar-answers{display:flex;flex-direction:column;gap:6px}
.ar-ans-row{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:8px;font-size:13px;line-height:1.45}
.ar-ans-row.your-correct{background:#E8F7EE;border:1px solid #A8D5B5}
.ar-ans-row.your-wrong{background:#FDECEA;border:1px solid #F5C6C3}
.ar-ans-row.correct-ans{background:#E8F1FF;border:1px solid var(--blue-mid)}
.ar-ans-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;white-space:nowrap;margin-top:1px}
.ar-ans-row.your-correct .ar-ans-label{color:#1E8A4A}
.ar-ans-row.your-wrong .ar-ans-label{color:#C5221F}
.ar-ans-row.correct-ans .ar-ans-label{color:var(--blue)}
.ar-ans-text{color:var(--gray);flex:1}
.ar-tick{font-size:14px;flex-shrink:0}
.ar-summary{text-align:center;padding:10px 0 4px;font-size:13px;font-weight:600;color:var(--gray)}
.ar-summary span{color:var(--blue)}

/* Fade animation */
.fade-in{animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Scrollbar */
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:var(--blue-mid);border-radius:2px}

/* Print / overflow helpers */
@media(max-width:768px){
  #sidebar{display:none}
  #main{margin-left:0}
  #screen-area{padding:24px 20px}
  .ch-title{font-size:22px}
}
</style>
</head>
<body>

<!-- HEADER -->
<header id="hdr">

    <div class="content-body">
      <h2>1.1 &nbsp;The World Before Digital Discovery</h2>
      <p>To appreciate how dramatically things have changed, it helps to begin at the beginning — the way consumers found businesses before the smartphone era.</p>
      <p>Before digital search became ubiquitous, a customer looking for a new restaurant, a nearby bank branch, or a local car service centre had a limited and largely passive toolkit. Discovery happened through:</p>
      <ul>
        <li><strong>The Yellow Pages telephone directory</strong> — a printed annual publication listing businesses by category</li>
        <li><strong>Newspaper and magazine advertisements</strong> — brands paid for space and hoped the right reader noticed</li>
        <li><strong>Billboards and hoardings</strong> — visible only to those who physically passed by</li>
        <li><strong>Word-of-mouth recommendations</strong> — powerful but slow and geographically limited</li>
        <li><strong>Television and radio commercials</strong> — broad reach, blunt targeting, high cost</li>
      </ul>
      <p>The fundamental characteristic of this era was that <strong>brands controlled the discovery moment</strong>. They decided when to advertise, where to place signage, and what message to broadcast. The consumer was largely passive — they encountered brands when the brand chose to appear in front of them.</p>

      <h2>1.2 &nbsp;The New Reality — Digital-First Discovery</h2>
      <p>Today, the average consumer has reversed this dynamic entirely. Within moments of a need arising — whether they are searching for the nearest pharmacy, a highly-rated restaurant for a client lunch, or a bank branch open on a Saturday — they reach for their phone.</p>
      <p>The modern discovery journey typically follows a fast, self-directed sequence:</p>
      <ol>
        <li>A need arises — immediate or planned</li>

        <li>They type or speak a query — often location-specific</li>
        <li>They evaluate results — listings, star ratings, photos, hours, distance</li>
        <li>They make a decision and act — navigate, call, visit, or book</li>
      </ol>
      <p>This entire journey can happen in under <strong>60 seconds</strong>. The brand that is not visible and compelling in that window effectively does not exist — as far as the consumer is concerned, they were never an option.</p>

      <h2>1.3 &nbsp;The Zero Moment of Truth (ZMOT)</h2>
      <p>Google coined the term <strong>Zero Moment of Truth (ZMOT)</strong> to describe this critical pre-purchase research phase. The concept reframes how we think about the consumer decision journey.</p>
      <p>Traditionally, marketers described the consumer journey as having a "First Moment of Truth" — the instant a shopper stands in front of a product in a store and makes a choice. ZMOT is everything that happens <em>before</em> the consumer ever reaches the store.</p>

      <ol>

        <li>She walks into the gym she chose online — <em>First Moment of Truth</em></li>
        <li>She experiences the gym — <em>Second Moment of Truth</em></li>
      </ol>

      <p>The consumer with proximity intent needs something <em>convenient</em>. They are not deeply brand-loyal in this moment; they primarily want the nearest acceptable option. Think: finding the nearest ATM when you urgently need cash, or locating a pharmacy when you are unwell. The brand that shows up first with accurate location data wins — almost regardless of brand preference.</p>

      <h3>Availability Intent — The Specific Seeker</h3>
      <p>The consumer with availability intent knows what they want and is checking whether they can get it locally. "Is there a Zara in this mall?" "Does the Ford dealer in Pune have the EcoSport in white?" For these consumers, the brand matters, but they need confirmation that what they want is accessible locally before they invest their time in a visit.</p>

      <p>The most high-value search intent of all. The consumer with immediacy intent has an urgent, time-sensitive need and is ready to act right now. For this consumer, the most critical data point is whether the business is <strong>open right now</strong>. A listing that shows the wrong hours loses this customer completely — and in a moment of urgency, that customer is unlikely to give that brand a second chance.</p>

        <li><strong>Time of day:</strong> "Open now" filtering, peak hour patterns, day of week</li>
        <li><strong>Device type:</strong> Mobile queries are treated as higher-urgency and given local-weighted results</li>
        <li><strong>Listing completeness:</strong> Google rewards complete, accurate, and recently updated listings with better placement</li>

      <h2>3.3 &nbsp;How Mobile Users Search Differently</h2>
      <p>Mobile search behaviour is meaningfully different from desktop behaviour — in ways that directly and significantly affect what local businesses need to do to win customers online.</p>

      <h3>Speed Over Depth</h3>
      <p>Mobile users want fast, direct answers. They are far less likely to scroll through multiple pages of search results. Research consistently shows that over 90% of mobile users never go beyond the first page of search results. If a business does not appear in the top 3–5 results for a local query, it is functionally invisible to the mobile searcher.</p>

      <h3>Action-Oriented Behaviour</h3>
      <p>A mobile searcher with local intent is typically much closer to a decision than a desktop researcher. Mobile searchers are more likely to call directly from a search result (click-to-call), request directions immediately, or visit the same day. The intent-to-action gap on mobile is measured in minutes, not days.</p>

      <h3>Voice Search Is Growing Rapidly</h3>
      <p>An increasing proportion of mobile searches in India are conducted by voice — particularly in regional languages. Queries such as "paas mein coffee shop" (coffee shop nearby in Hindi) or "ingé yenna restaurant irukku" (what restaurants are here in Tamil) are becoming common. Voice search queries are typically longer, more conversational, and almost always local in intent.</p>

      <h3>Location Services Are Always On</h3>
      <p>Unlike desktop users, mobile users almost universally have location services enabled. This means Google can serve hyper-precise local results — sometimes to within a street block — making the accuracy of a business's location data more critical than ever.</p>

      <h2>3.4 &nbsp;The Tier 1, 2, and 3 Opportunity</h2>
      <p>One of the most strategically important realities for multi-location brands is that mobile-first local search is not confined to metropolitan India. It is rapidly becoming a national phenomenon — with profound implications for brands with store networks in smaller cities.</p>

      <ul>
        <li><strong>Tier 1 Cities (Mumbai, Delhi, Bengaluru, Chennai):</strong> High smartphone penetration. High digital awareness. Competition for local search results is intense. Every major brand has an optimised presence. Winning requires exceptional quality — better photos, more reviews, faster response, greater accuracy.</li>
        <li><strong>Tier 2 Cities (Jaipur, Surat, Lucknow, Kochi, Nagpur):</strong> Rapidly growing smartphone and data adoption. Search volume is high and rising. However, far fewer local businesses have optimised their digital presence. First-mover advantage is significant — a well-optimised listing can dominate local results with relatively modest effort.</li>
        <li><strong>Tier 3 Cities and Towns:</strong> Search volume is growing quickly. Competition for local digital results is very low. A brand that invests in accurate, complete listings in Tier 3 markets can achieve outsized visibility and returns relative to investment.</li>
      </ul>

          <div class="cs-result">The brand made Tier 2 and Tier 3 digital presence a strategic priority and saw <span>disproportionate ROI</span> relative to metropolitan markets — demonstrating that local search opportunity is inversely correlated with competition, not with city size.</div>

      <h2>5.1 &nbsp;What Traditional Mass Marketing Looks Like</h2>
      <p>To understand why mass marketing is losing ground, we must first understand how it works and what assumptions it is built on.</p>
      <p>Traditional mass marketing operates on a <strong>broadcast model</strong>. A brand creates one message and pushes it to the largest possible audience through paid media channels:</p>
      <ul>
        <li><strong>Television:</strong> A 30-second commercial aired during prime time reaches millions of viewers simultaneously. It is expensive, geographically imprecise, and measured in estimated reach rather than confirmed consumer action.</li>

      </ul>
      <p>The common characteristic of all these channels is that they are <strong>push-based</strong>: the brand pushes its message outward to the maximum possible audience, hoping that enough of those recipients are potential customers who happen to be in a relevant buying moment.</p>

      <h2>5.2 &nbsp;The Relevance Gap — The Core Problem</h2>
      <p>The critical limitation of mass marketing is what we might call the <strong>relevance gap</strong> — the distance between who you reach and who is actually a qualified potential customer at the moment of exposure.</p>
      <p>Consider a concrete scenario: A leading national bank runs a prime-time television commercial promoting its personal loan product. The commercial reaches 10 million viewers. Of those 10 million:</p>

        <li><strong>500,000</strong> are actively in the market for a personal loan right now</li>
      </ul>
      <p>The brand paid for 10 million impressions. It was genuinely relevant to approximately 500,000 people — <strong>5% of the audience</strong>. The remaining 95% of the advertising cost delivered no meaningful commercial outcome for this specific campaign objective.</p>

          <rect x="420" y="210" width="260" height="28" rx="6" fill="#E8F1FF" stroke="#C2D9FF" stroke-width="1.5"/>
          <text x="550" y="228" text-anchor="middle" font-size="11" fill="#0070FC" font-weight="600">Appear only when intent is highest</text>
        </svg>
      </div>

      <h2>5.3 &nbsp;The Shift — From Broadcasting to Being Found</h2>
      <p>Search-based discovery has fundamentally inverted the marketing equation. Instead of a brand pushing its message outward and hoping for relevant recipients, the consumer <strong>actively raises their hand</strong>.</p>
      <p>When someone searches "personal loan branch near Connaught Place open today", they are not a passive viewer of an advertisement. They are an <strong>active buyer with a specific need, at a specific moment, in a specific location</strong>. They are asking to be found. The only question is which brand is present and compelling enough to be chosen.</p>
      <p>This is the fundamental shift: marketing moves from <strong>interruption to invitation</strong>. The consumer sends the signal. The brand's job is to be in the right place, with the right information, at the right moment — and to be credible enough to earn the visit.</p>

      <h3>The New Marketing Imperative for Multi-Location Brands</h3>
      <p>This does not mean traditional marketing has no role. Brand awareness — built through television, outdoor, and digital display — still matters. Consumers cannot search for a brand they have never heard of. But awareness without local discoverability is incomplete. A consumer who has seen a brand's advertisement but cannot find the nearest location, or finds an inaccurate listing when they do search, has been failed by the brand at the most critical moment.</p>
      <p>The most effective multi-location brand strategy layers <strong>national awareness</strong> (so consumers know the brand exists) with <strong>local discoverability</strong> (so that when awareness converts to intent, the brand is findable, accurate, and compelling at the point of decision).</p>

      <div class="case-study">
        <div class="cs-label">Case Study</div>
        <div class="cs-title">Lifestyle — 159X Marketing ROI Through Local Discoverability</div>
        <div class="cs-body">
          <p>Lifestyle, one of India's leading fashion retail chains, faced a challenge familiar to every multi-location brand: national advertising built awareness, but awareness alone was not reliably translating into store visits across its diverse network of locations.</p>
          <p>The strategic question was how to close the gap between a consumer who knows the Lifestyle brand and a consumer who walks into a Lifestyle store.</p>
          <p>The answer, implemented through SingleInterface, was a hyperlocal digital presence strategy:</p>
          <ol>
            <li>Every Lifestyle store's Google Business Profile was optimised with accurate information, current offers, store-specific photos, and correct operating hours</li>
            <li>Hyperlocal digital campaigns were created to target consumers searching in proximity to specific stores — not generic national campaigns</li>
            <li>Local-specific content was created to make each store's digital presence relevant to its immediate community</li>
          </ol>
          <div class="cs-result">
            Digital visibility increased by <span>155%</span> &nbsp;·&nbsp; Store visits increased by <span>322%</span> &nbsp;·&nbsp; Marketing ROI: <span>159X</span><br><br>
            The insight: traditional marketing created awareness. Local discoverability converted awareness into footfall. Neither alone was sufficient — together, they were transformational.
          </div>
        </div>
      </div>

      <h2>5.4 &nbsp;What This Means for Your Sales Conversations</h2>
      <p>When you sit across from a VP Marketing or a Head of Digital at a multi-location brand, the most powerful question you can ask is not about features or pricing — it is this:</p>
      <p style="border-left:3px solid #0070FC;padding:12px 20px;background:#F2F8FF;border-radius:0 8px 8px 0;font-style:italic;color:#0A1F5C;font-family:Georgia,serif;font-size:16px;">"When your customer is standing 300 metres from one of your stores, searching for exactly what you sell — are you appearing? And when you do appear, is what they see accurate, recent, and compelling enough to earn their visit?"</p>
      <p>That question, grounded in the principles covered in this topic, is the opening of every effective sales conversation in the local presence management space.</p>

      <div class="takeaways">
        <div class="takeaways-label">Key Takeaways — Chapter 5</div>
        <ul>
          <li>Traditional mass marketing is push-based — brands broadcast to large audiences and hope for relevant recipients</li>
          <li>The relevance gap means brands typically pay for 100% of reach to be relevant to 5–15% of the audience</li>
          <li>Search-based local discovery inverts this — brands appear only when consumers are actively seeking what they offer</li>
          <li>The shift is from interruption (push) to invitation (pull) — from broadcasting to being found</li>
          <li>Lifestyle achieved 159X marketing ROI by combining national awareness with local discoverability — demonstrating that the two are complementary, not competing</li>
          <li>For sales professionals: the discovery gap question is the most powerful opening in any local presence conversation</li>

/* ================================================================
   NAVIGATION & RENDERING
   ================================================================ */
var CH_DURATIONS = [10, 10, 10, 10, 10]; // minutes per chapter
var TOTAL_MIN = 60; // 50 chapters + 10 assessment

function getProgress() {
  var done = state.completed.filter(Boolean).length;
  if (state.current === 6) done = 5;
  return done;
}

function updateProgress() {
  var done = getProgress();
  var pct = Math.round((done / 5) * 100);
  document.getElementById('hdr-bar').style.width = pct + '%';
  document.getElementById('hdr-pct').textContent = pct + '%';
  updateDuration();
  renderSidebar();
}

function updateDuration() {
  var doneMins = 0;
  for (var i = 0; i < state.completed.length; i++) {
    if (state.completed[i]) doneMins += CH_DURATIONS[i];
  }
  if (state.trackPassed) doneMins += 10; // only count assessment when passed
  var remainMins = Math.max(0, TOTAL_MIN - doneMins);
  document.getElementById('t-done').textContent = doneMins + ' min';
  document.getElementById('t-remain').textContent = remainMins + ' min';
}

function renderSidebar() {
  var nav = document.getElementById('chapter-nav');
  nav.innerHTML = '';
  for (var i = 0; i < chapters.length; i++) {
    (function(idx) {
      var ch = chapters[idx];
      var isCompleted = state.completed[idx];
      var isActive = state.current === idx;
      var isLocked = !isCompleted && idx > 0 && !state.completed[idx - 1];

      var div = document.createElement('div');
      div.className = 'sb-ch' + (isActive ? ' active' : '') + (isCompleted ? ' completed' : '') + (isLocked ? ' locked' : '');
      div.innerHTML =
        '<div class="sb-icon">' + (isCompleted ? '✓' : (idx + 1)) + '</div>' +
        '<div class="sb-ch-text">' +
          '<div class="sb-ch-num">Chapter ' + (idx + 1) + '</div>' +
          '<div class="sb-ch-title">' + ch.title + '</div>' +
        '</div>';

      if (!isLocked) {
        div.onclick = function() { goToChapter(idx); };
      }
      nav.appendChild(div);
    })(i);
  }

  var allDone = state.completed.every(Boolean);
  var assessBtn = document.getElementById('sb-assess-btn');
  var assessActive = document.getElementById('sb-assess-active');
  var trackOk = document.getElementById('sb-track-complete');
  var trackBad = document.getElementById('sb-track-incomplete');

  var showAssess = allDone && state.current !== 5 && state.current !== 6;
  var showActive = (state.current === 5);
  var showTrackOk = (state.current === 6 && state.trackPassed);
  var showTrackBad = (state.current === 6 && state.assessScore !== null && !state.trackPassed);

  assessBtn.classList.toggle('visible', showAssess);
  assessActive.style.display = showActive ? 'block' : 'none';
  if (trackOk) trackOk.style.display = showTrackOk ? 'block' : 'none';
  if (trackBad) trackBad.style.display = showTrackBad ? 'block' : 'none';
}

function goToChapter(idx) {
  state.current = idx;
  renderChapter(idx);
  updateProgress();
  window.scrollTo(0, 0);
}

function renderChapter(idx) {
  var ch = chapters[idx];
  var sa = document.getElementById('screen-area');
  var prevDisabled = (idx === 0) || (!state.completed[idx-1] && idx > 0);
  var isLastChapter = idx === chapters.length - 1;
  var nextLabel = isLastChapter ? 'Complete Topic & Take Assessment' : 'Complete & Continue →';

  sa.innerHTML =
    '<div class="fade-in">' +
    '<div class="ch-eyebrow">' +
      '<span class="ch-eyebrow-tag">Chapter ' + (idx + 1) + ' of 5</span>' +
      '<span class="ch-eyebrow-track">Track 01 · The Discovery Economy</span>' +
    '</div>' +
    '<h1 class="ch-title">' + ch.title + '</h1>' +
    '<div class="ch-intro-bar"></div>' +
    '<div class="ch-objectives">' +
      '<div class="ch-obj-label">Learning Objectives</div>' +
      '<ul class="ch-obj-list">' +
        ch.objectives.map(function(o){return '<li>' + o + '</li>';}).join('') +
      '</ul>' +
    '</div>' +
    ch.content +
    '<div class="ch-nav-footer">' +
      '<button class="btn-prev" onclick="goPrev(' + idx + ')" ' + (idx === 0 ? 'disabled' : '') + '>← Previous Chapter</button>' +
      '<span class="ch-of">' + (idx + 1) + ' / 5</span>' +
      '<button class="btn-next" onclick="completeAndNext(' + idx + ')">' + nextLabel + '</button>' +
    '</div>' +
    '</div>';
}

function goPrev(idx) {
  if (idx > 0) goToChapter(idx - 1);
}

function completeAndNext(idx) {
  state.completed[idx] = true;
  if (idx < chapters.length - 1) {
    goToChapter(idx + 1);
  } else {
    startAssessment();
  }
  updateProgress();
}

/* ================================================================
   ASSESSMENT
   ================================================================ */
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function startAssessment() {
  if (!state.completed.every(Boolean)) return;
  state.current = 5;
  state.assessQuestions = shuffle(qPool).slice(0, 10);
  state.assessAnswers = new Array(10).fill(-1);
  state.assessSubmitted = false;
  renderAssessment();
  updateProgress();
  document.getElementById('sb-assess-btn').classList.remove('visible');
  document.getElementById('sb-assess-active').style.display = 'block';
  window.scrollTo(0, 0);
}

function renderAssessment() {
  var sa = document.getElementById('screen-area');
  var qs = state.assessQuestions;

  var html = '<div class="fade-in">' +
    '<div class="assess-header">' +
      '<h1 class="assess-title">Topic Assessment</h1>' +
      '<p class="assess-sub">Answer all 10 questions below. You can review the chapters at any time by clicking them in the sidebar. A score of 70% or higher is required to complete this topic. If you retake the assessment, you will receive a new set of questions.</p>' +
      '<div class="assess-meta">' +
        '<span class="assess-meta-chip">10 Questions</span>' +
        '<span class="assess-meta-chip">Pass: 7 / 10</span>' +
        '<span class="assess-meta-chip">Topic 1 — The Local-First Digital Shift</span>' +
      '</div>' +
    '</div>';

  qs.forEach(function(q, i) {
    html += '<div class="q-block" id="qb-' + i + '">' +
      '<div class="q-num">Question ' + (i+1) + ' of 10</div>' +
      '<div class="q-text">' + q.q + '</div>' +
      '<div class="q-options">';
    q.opts.forEach(function(opt, oi) {
      html += '<label class="q-opt" id="qopt-' + i + '-' + oi + '" onclick="selectAnswer(' + i + ',' + oi + ')">' +
        '<input type="radio" name="q' + i + '" value="' + oi + '"> ' +
        '<span class="q-opt-label">' + opt + '</span>' +
      '</label>';
    });
    html += '</div></div>';
  });

  html += '<button class="assess-submit" id="assess-submit" onclick="submitAssessment()" disabled>Submit Assessment</button>' +
    '</div>';

  sa.innerHTML = html;
}

function selectAnswer(qIdx, optIdx) {
  state.assessAnswers[qIdx] = optIdx;
  // Update visual
  var qs = state.assessQuestions;
  for (var oi = 0; oi < qs[qIdx].opts.length; oi++) {
    var el = document.getElementById('qopt-' + qIdx + '-' + oi);
    if (el) el.classList.toggle('selected', oi === optIdx);
  }
  // Enable submit if all answered
  var allAnswered = state.assessAnswers.every(function(a){ return a !== -1; });
  var btn = document.getElementById('assess-submit');
  if (btn) btn.disabled = !allAnswered;
}

function submitAssessment() {
  var score = 0;
  state.assessQuestions.forEach(function(q, i) {
    if (state.assessAnswers[i] === q.ans) score++;
  });
  state.assessScore = score;
  state.assessSubmitted = true;
  var pct = Math.round((score / 10) * 100);
  var passed = score >= 7;
  setSCORMStatus(passed ? 'passed' : 'failed', pct);
  renderResults(score, pct, passed);
}

/* ================================================================
   RESULTS

            '<span style="font-size:24px">🎓</span>' +
            '<div><div style="font-size:13px;font-weight:700;color:#1E8A4A;margin-bottom:2px">Track Completed</div>' +

            '<div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#C45C00;margin-bottom:6px">⚠ Track Not Yet Complete</div>' +

          '</div>'
      ) +
      '<div class="results-actions">' +
        (passed ? '<button class="btn-results-primary" onclick="alert(\'Proceeding to next topic\')">Next Topic →</button>' : '') +

        '📋 Review My Answers — See what you got right and wrong' +

  document.getElementById('sb-assess-active').style.display = 'none';

function buildAnswerReview(score) {
  var correct = score;
  var html = '<div class="ar-inner">';
  html += '<div class="ar-summary">You answered <span>' + correct + ' of 10</span> questions correctly.</div>';
  state.assessQuestions.forEach(function(q, i) {
    var ua = state.assessAnswers[i];
    var isCorrect = (ua === q.ans);
    var uaText = (ua >= 0 && ua < q.opts.length) ? q.opts[ua] : 'No answer selected';
    var caText = q.opts[q.ans];
    html += '<div class="ar-item">';
    html += '<div class="ar-q-num">Question ' + (i + 1) + ' of 10</div>';
    html += '<div class="ar-q-text">' + q.q + '</div>';
    html += '<div class="ar-answers">';
    // User answer row
    html += '<div class="ar-ans-row ' + (isCorrect ? 'your-correct' : 'your-wrong') + '">';
    html += '<span class="ar-tick">' + (isCorrect ? '✅' : '❌') + '</span>';
    html += '<span class="ar-ans-label">Your answer</span>';
    html += '<span class="ar-ans-text">' + uaText + '</span>';
    html += '</div>';
    // Correct answer row — always shown
    if (!isCorrect) {
      html += '<div class="ar-ans-row correct-ans">';
      html += '<span class="ar-tick">✅</span>';
      html += '<span class="ar-ans-label">Correct answer</span>';
      html += '<span class="ar-ans-text">' + caText + '</span>';
      html += '</div>';
    }
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

function toggleAnswerReview() {
  var btn = document.getElementById('ans-review-btn');
  var panel = document.getElementById('ans-review-panel');
  if (!btn || !panel) return;
  var isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
}

}
